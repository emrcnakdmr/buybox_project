<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ürünü Düzenle</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-body">
                <h4 class="card-title text-warning mb-4">✏️ Ürünü Düzenle</h4>
                <form action="/duzenle/{{ urun[0] }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Firma Barkodu</label>
                        <input type="text" class="form-control" name="barkod" value="{{ urun[1] }}" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Akakçe Linki</label>
                        <input type="url" class="form-control" name="link" value="{{ urun[3] }}" required>
                    </div>
                    <button type="submit" class="btn btn-success" onclick="this.innerHTML='Güncelleniyor...'">Kaydet ve Çık</button>
                    <a href="/" class="btn btn-secondary">İptal</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
